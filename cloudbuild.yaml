steps:
  # Paso 1: Construir la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ticket-app:$COMMIT_SHA', '.']
  
  # Paso 2: Subir la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ticket-app:$COMMIT_SHA']

  # Paso 3: Desplegar en Cloud Run automáticamente
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ticket-frontend'
      - '--image=gcr.io/$PROJECT_ID/ticket-app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated' # <-- ¡Esta es la clave para que no falle!

options:
  logging: CLOUD_LOGGING_ONLY